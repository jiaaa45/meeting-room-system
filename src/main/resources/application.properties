spring.application.name=meeting-room-system

# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/meeting_room
spring.datasource.username=meeting_room_user
spring.datasource.password=meeting_room_pass

# Hibernate only validates against existing schema, never auto-creates tables
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway manages schema creation
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8081