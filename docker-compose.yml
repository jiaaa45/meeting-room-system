services:
  postgres:
    image: postgres:16-alpine
    container_name: meeting-room-db
    environment:
      POSTGRES_DB: meeting_room
      POSTGRES_USER: meeting_room_user
      POSTGRES_PASSWORD: meeting_room_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeting_room_user -d meeting_room"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: